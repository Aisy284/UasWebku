<!DOCTYPE html>
<html lang="id">
<head>
    <title>Beach Packing Checklist - PackRight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="beach-page">

    <nav class="navbar">
        <div class="navbar-logo">
            <h1>PackRight✨</h1>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="gunung.html">Mountain</a></li>
            <li><a href="pantai.html" class="active">Beach</a></li>
            <li><a href="mudik.html">Travel</a></li>
        </ul>
    </nav>

    <header class="page-head">
        <h1>🏖️ Beach Holiday Organizer</h1>
        <p>Jangan sampai liburan santaimu terganggu karena kacamata hitam atau sunscreen tertinggal!</p>
    </header>
    
    <main class="beach-wrapper">
        
        <div class="check-card">
            <h3>☀️ Essentials & Sun Protection</h3>
            <ul class="check-list">
                <li><input type="checkbox" id="b1"><label for="b1">Sunscreen / Sunblock (Wajib biar ga gosong)</label></li>
                <li><input type="checkbox" id="b2"><label for="b2">Kacamata Hitam (Sunglasses)</label></li>
                <li><input type="checkbox" id="b3"><label for="b3">Topi Pantai (Bucket hat / Straw hat)</label></li>
                <li><input type="checkbox" id="b4"><label for="b4">Lip balm SPF & Pelembab kulit</label></li>
                <li><input type="checkbox" id="b5"><label for="b5">Obat pribadi & Tolak Angin (Takut angin malam pantai)</label></li>
            </ul>
        </div>

        <div class="check-card">
            <h3>🩱 Beach Apparel & Swimwear</h3>
            <ul class="check-list">
                <li><input type="checkbox" id="b6"><label for="b6">Baju Renang / Bikini / Boardshorts</label></li>
                <li><input type="checkbox" id="b7"><label for="b7">Baju Santai / Kaos lemes & Celana pendek</label></li>
                <li><input type="checkbox" id="b8"><label for="b8">Kain Pantai / Sarung Bali</label></li>
                <li><input type="checkbox" id="b9"><label for="b9">Sandal jepit (Flip-flops) yang nyaman</label></li>
                <li><input type="checkbox" id="b10"><label for="b10">Pakaian dalam cadangan & Kantong kresek baju basah</label></li>
            </ul>
        </div>

        <div class="check-card">
            <h3>📸 Fun, Gadget & Accessories</h3>
            <ul class="check-list">
                <li><input type="checkbox" id="b11"><label for="b11">Handuk Pantai (Quick-dry lebih bagus)</label></li>
                <li><input type="checkbox" id="b12"><label for="b12">Waterproof Case HP (Biar bisa foto di air)</label></li>
                <li><input type="checkbox" id="b13"><label for="b13">Kamera / Action cam & Powerbank</label></li>
                <li><input type="checkbox" id="b14"><label for="b14">Tote bag transparan / Tas anyaman</label></li>
                <li><input type="checkbox" id="b15"><label for="b15">Speaker Bluetooth portable (Biar makin asik)</label></li>
            </ul>
        </div>

    </main>

</body>
</html>
