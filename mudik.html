<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel & Mudik Checklist - PackRight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="travel-page">

    <nav class="navbar">
        <div class="navbar-logo">
            <h1>PackRight✨</h1>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="gunung.html">Mountain</a></li>
            <li><a href="pantai.html">Beach</a></li>
            <li><a href="mudik.html" class="active">Travel</a></li>
        </ul>
    </nav>

    <header class="page-heade">
        <h1>🧳 Travel & Mudik Organizer</h1>
        <p>Cek kembali barang bawaanmu agar perjalanan mudik dan liburanmu tetap aman dan nyaman!</p>
    </header>
    
    <main class="travel-wrapper">
        
        <div class="chelist-card">
            <h3>💳 Documents & Essentials</h3>
            <ul class="checklist-b">
                <li><input type="checkbox" id="v1"><label for="v1">Dompet, KTP, & SIM (Jangan tertinggal!)</label></li>
                <li><input type="checkbox" id="v2"><label for="v2">Tiket (Kereta/Pesawat/Bus) atau Kartu E-Toll (Isi Saldo!)</label></li>
                <li><input type="checkbox" id="v3"><label for="v3">Uang Tunai Secukupnya (Untuk beli jajan di rest area)</label></li>
                <li><input type="checkbox" id="v4"><label for="v4">BPJS / Kartu Asuransi Kesehatan</label></li>
                <li><input type="checkbox" id="v5"><label for="v5">Kunci Rumah (Pastikan rumah sudah terkunci aman)</label></li>
            </ul>
        </div>

        <div class="chelist-card">
            <h3>👕 Apparel & Personal Care</h3>
            <ul class="checklist-b">
                <li><input type="checkbox" id="v6"><label for="v6">Baju Utama & Pakaian Dalam (Hitung sesuai jumlah hari)</label></li>
                <li><input type="checkbox" id="v7"><label for="v7">Jaket / Outer Hangat (Biar ga masuk angin di jalan)</label></li>
                <li><input type="checkbox" id="v8"><label for="v8">Alat Mandi Portable & Skincare Minimalis</label></li>
                <li><input type="checkbox" id="v9"><label for="v9">Sandal / Sepatu Kasual yang Nyaman</label></li>
                <li><input type="checkbox" id="v10"><label for="v10">P3K Umum (Minyak angin, Antimo, Obat pusing, Plester)</label></li>
            </ul>
        </div>

        <div class="chelist-card">
            <h3>🔋 Gadget & Roadtrip Comfort</h3>
            <ul class="checklist-b">
                <li><input type="checkbox" id="v11"><label for="v11">Smartphone & Charger (Wajib banget)</label></li>
                <li><input type="checkbox" id="v12"><label for="v12">Powerbank (Biar baterai ga drop pas maps nyala)</label></li>
                <li><input type="checkbox" id="v13"><label for="v13">Bantal Leher & Masker Kain</label></li>
                <li><input type="checkbox" id="v14"><label for="v14">Earphone / Headphone & Playlist Lagu Favorit</label></li>
                <li><input type="checkbox" id="v15"><label for="v15">Camilan & Botol Minum (Tumbler) untuk di jalan</label></li>
            </ul>
        </div>

    </main>

</body>
</html>
